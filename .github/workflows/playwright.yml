name: Playwright Tests
on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *" # Note: GitHub Actions ignores 1-minute crons. The minimum allowed is 5 mins, 15 is safer!
jobs:
  test:
    timeout-minutes: 10
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: Install dependencies
      run: npm install

    # FIXED CACHE KEY: Added runner.os AND the explicit version to prevent poisoning
    # - uses: actions/cache@v4
     # with:
      #  path: ~/.cache/ms-playwright
      #  key: ${{ runner.os }}-ubuntu24.04-playwright-${{ hashFiles('**/package-lock.json') }}
      #  restore-keys: |
       #   ${{ runner.os }}-ubuntu24.04-playwright-

    # WORKAROUND: Force Ubuntu 24.04 to natively satisfy the audio package mapping
    - name: Pre-install Noble Ubuntu Audio Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libasound2t64

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium

    - name: Create .env file
      run: |
        touch .env
        echo "EMAIL=${{ secrets.EMAIL }}" >> .env
        echo "PASSWORD=${{ secrets.PASSWORD }}" >> .env
        echo "MAX_FUEL_PRICE=${{ vars.MAX_FUEL_PRICE }}" >> .env
        echo "MAX_CO2_PRICE=${{ vars.MAX_CO2_PRICE }}" >> .env

    - name: Run Playwright tests
      run: npx playwright test
    #     retention-days: 1
